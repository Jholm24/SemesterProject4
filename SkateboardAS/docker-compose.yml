services:
  mqtt:
    image: thmork/st4-mqtt:latest
    ports:
      - "1883:1883"
      - "9001:9001"

  st4-agv:
    image: thmork/st4-agv:latest
    ports:
      - "8082:80"

  st4-warehouse:
    image: thmork/st4-warehouse:latest
    ports:
      - "8081:80"

  st4-assemblystation:
    image: thmork/st4-assemblystation:latest
    environment:
      MQTT_TCP_CONNECTION_HOST: "mqtt"
      MQTT_TCP_CONNECTION_PORT: 1883
    depends_on:
      - mqtt

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: skateboardas
      POSTGRES_PASSWORD: skateboardas
      POSTGRES_DB: skateboardas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - mqtt
      - st4-agv
      - st4-warehouse
      - st4-assemblystation
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/skateboardas
      SPRING_DATASOURCE_USERNAME: skateboardas
      SPRING_DATASOURCE_PASSWORD: skateboardas

volumes:
  pgdata:
